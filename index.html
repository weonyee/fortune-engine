<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만세력</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="top-bar">
    <button class="hamburger" onclick="toggleDrawer()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <h1>만세력</h1>
  </div>

  <!-- 성별 -->
  <div class="section">
    <div class="section-label">성별</div>
    <div class="toggle-group">
      <label><input type="radio" name="gender" value="남" checked><span>남</span></label>
      <label><input type="radio" name="gender" value="여"><span>여</span></label>
    </div>
  </div>

  <!-- 생년월일시 -->
  <div class="section">
    <div class="section-label">생년월일시</div>
    <div class="input-row">
      <div class="input-box" style="position:relative;">
        <input type="text" id="birthdate" class="field" inputmode="numeric" maxlength="14" placeholder="YYYY / MM / DD" autocomplete="off">
        <span class="field-error" id="dateError"></span>
      </div>
      <div class="input-box" style="position:relative;">
        <input type="text" id="timeInput" class="field" inputmode="numeric" maxlength="5" placeholder="HH:MM" autocomplete="off">
        <span class="field-error" id="timeError"></span>
        <div class="time-badge" id="timeBadge"></div>
      </div>
    </div>
    <div class="check-row">
      <label><input type="checkbox" id="noTime"> 시간 모름</label>
    </div>
  </div>

  <!-- 도시 -->
  <div class="section">
    <div class="section-label">도시</div>
    <select id="region" class="field">
      <option value="">보정 안함</option>
      <option value="126.98">서울</option>
      <option value="129.03">부산</option>
      <option value="128.60">대구</option>
      <option value="126.70">인천</option>
      <option value="126.85">광주</option>
      <option value="127.38">대전</option>
      <option value="129.31">울산</option>
      <option value="127.00">수원</option>
      <option value="127.73">청주</option>
      <option value="128.88">포항</option>
      <option value="126.53">목포</option>
      <option value="126.57">제주</option>
      <option value="128.73">강릉</option>
      <option value="127.15">천안</option>
    </select>
  </div>

  <button class="btn" id="calcBtn" onclick="calculate()">만세력 보러가기</button>

  <!-- 결과 -->
  <div class="result" id="resultWrap">
    <table class="st" id="sajuTable"></table>
    <div class="meta" id="infoBox"></div>
    <div class="summary-box" id="summaryBox"></div>
    <div class="summary-box" id="todayBox"></div>
    <div class="un-wrap" id="unWrap">
      <div class="un-section" id="daeunBox"></div>
      <div class="un-divider"></div>
      <div class="un-section" id="yeonunBox"></div>
      <div class="un-divider"></div>
      <div class="un-section" id="wolunBox"></div>
    </div>
    <div class="summary-box" id="calendarBox"></div>
    <button class="btn-save" id="saveBtn" onclick="saveResult()">저장하기</button>
  </div>

  <!-- 저장 목록 -->
  <div class="saved-section" id="savedSection">
    <div class="section-label" style="margin-top:32px;">저장된 만세력</div>
    <div id="savedList"></div>
    <div class="saved-empty" id="savedEmpty">저장된 만세력이 없습니다</div>
  </div>

  <div class="footer">manseryeok-js · 고영창 진짜만세력 기반</div>
</div>

<!-- 저장 모달 -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-title">만세력 저장</div>
    <div class="modal-desc">저장할 이름을 입력해주세요</div>
    <input type="text" id="saveNameInput" class="modal-input" placeholder="예) 홍길동" maxlength="20" autocomplete="off">
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modalCancel">취소</button>
      <button class="modal-btn confirm" id="modalConfirm">저장</button>
    </div>
  </div>
</div>

<!-- 사이드 드로어 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">저장된 만세력</div>
    <div class="drawer-body" id="drawerList"></div>
  </div>
</div>

<!-- ── UI 로직 ── -->
<script src="js/ui.js"></script>

<!-- ── 계산 엔진 ── -->
<script type="module" src="js/main.mjs"></script>

</body>
</html>
